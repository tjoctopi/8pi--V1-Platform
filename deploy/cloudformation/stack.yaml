AWSTemplateFormatVersion: "2010-09-09"
Description: "8pi v1 — single-EC2 stack (VPC + subnet + IGW + EIP + SG + Ubuntu 22.04)"

Parameters:
  RepoUrl:
    Type: String
    Description: "Public git URL of your 8pi fork (e.g. https://github.com/you/8pi.git)"
  Branch:
    Type: String
    Default: main
  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues: [t3.medium, t3.large, t3.xlarge, m6i.large, m6i.xlarge]
  RootVolumeGb:
    Type: Number
    Default: 30
  SshCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: "CIDR allowed to SSH — restrict to your IP/32 in prod."
  Domain:
    Type: String
    Default: ""
    Description: "FQDN for TLS. Empty = serve on raw IP without HTTPS."
  TlsEmail:
    Type: String
    Default: ""
  SeedAdminEmail:
    Type: String
  SeedAdminPassword:
    Type: String
    NoEcho: true
  JwtSecret:
    Type: String
    NoEcho: true
    Description: "64-char hex. python -c 'import secrets;print(secrets.token_hex(32))'"
  BedrockModelId:
    Type: String
    Default: "us.anthropic.claude-opus-4-8"
    Description: "Amazon Bedrock model ID / geo inference profile (Claude Opus 4.8 US default)."
  ToolMode:
    Type: String
    Default: auto
    AllowedValues: [auto, real, sim]

Mappings:
  AmiByRegion:
    # Ubuntu 22.04 LTS amd64 HVM SSD (Canonical) — update as needed
    us-east-1:      { AMI: ami-04b70fa74e45c3917 }
    us-east-2:      { AMI: ami-05fb0b8c1424f266b }
    us-west-1:      { AMI: ami-0d413c682033e11fd }
    us-west-2:      { AMI: ami-008fe2fc65df48dac }
    eu-west-1:      { AMI: ami-0fe0b2cf0e1f25c8a }
    eu-central-1:   { AMI: ami-04a5bacc58328233d }
    ap-south-1:     { AMI: ami-0f58b397bc5c1f2e8 }
    ap-southeast-1: { AMI: ami-0e5c34cdd2f3f0d21 }

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.20.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags: [{ Key: Name, Value: !Sub "${AWS::StackName}-vpc" }]

  Igw:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags: [{ Key: Name, Value: !Sub "${AWS::StackName}-igw" }]

  AttachIgw:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties: { VpcId: !Ref Vpc, InternetGatewayId: !Ref Igw }

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.20.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs ""]

  Rt:
    Type: AWS::EC2::RouteTable
    Properties: { VpcId: !Ref Vpc }

  RtDefault:
    Type: AWS::EC2::Route
    DependsOn: AttachIgw
    Properties:
      RouteTableId: !Ref Rt
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw

  RtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { RouteTableId: !Ref Rt, SubnetId: !Ref PublicSubnet }

  Sg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 8pi web + ssh
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 80,  ToPort: 80,  CidrIp: 0.0.0.0/0 }
        - { IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: 0.0.0.0/0 }
        - { IpProtocol: tcp, FromPort: 22,  ToPort: 22,  CidrIp: !Ref SshCidr }

  AppRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: bedrock-invoke
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: "*"

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref AppRole]

  Ec2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [AmiByRegion, !Ref "AWS::Region", AMI]
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds: [!Ref Sg]
      IamInstanceProfile: !Ref InstanceProfile
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: !Ref RootVolumeGb
            VolumeType: gp3
            Encrypted: true
      Tags: [{ Key: Name, Value: !Sub "${AWS::StackName}-app" }]
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
          exec > >(tee -a /var/log/8pi-bootstrap.log) 2>&1
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -y
          apt-get install -y ca-certificates curl gnupg lsb-release ufw git
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list
          apt-get update -y
          apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
          usermod -aG docker ubuntu
          systemctl enable --now docker
          install -o ubuntu -g ubuntu -d /opt/8pi
          cd /opt/8pi
          sudo -u ubuntu git clone --branch "${Branch}" "${RepoUrl}" src
          cd src
          cat > /opt/8pi/src/.env <<EOF
          DB_NAME=eightpi_db
          JWT_SECRET=${JwtSecret}
          SEED_ADMIN_EMAIL=${SeedAdminEmail}
          SEED_ADMIN_PASSWORD=${SeedAdminPassword}
          SEED_ADMIN_NAME=8pi Admin
          AWS_REGION=${AWS::Region}
          BEDROCK_MODEL_ID=${BedrockModelId}
          TOOL_MODE=${ToolMode}
          HTTP_PORT=80
          COOKIE_SECURE=false
          FRONTEND_ORIGINS=
          REACT_APP_BACKEND_URL=
          EOF
          chmod 600 /opt/8pi/src/.env
          chown ubuntu:ubuntu /opt/8pi/src/.env
          sudo -u ubuntu docker compose --project-name 8pi build
          sudo -u ubuntu docker compose --project-name 8pi up -d
          ufw --force reset >/dev/null
          ufw default deny incoming
          ufw default allow outgoing
          ufw allow 22/tcp
          ufw allow 80/tcp
          ufw allow 443/tcp
          ufw --force enable
          echo "[8pi] bootstrap complete at $(date -u)"

  Eip:
    Type: AWS::EC2::EIP
    Properties: { Domain: vpc, InstanceId: !Ref Ec2 }

Outputs:
  AppUrl:
    Description: "URL to open (~4 min after stack create)"
    Value: !Sub "http://${Eip}"
  PublicIp:
    Value: !Ref Eip
  SshCommand:
    Value: !Sub "ssh -i <your-key.pem> ubuntu@${Eip}"
