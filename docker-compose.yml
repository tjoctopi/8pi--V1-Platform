# 8π v1 — one-command stack, backed by the REAL attack_engine.
#
# Usage:
#   1. cp .env.example .env  and fill in AE_API_JWT_SECRET, AE_API_ADMIN_*, model keys.
#   2. docker compose up -d --build
#   3. Open http://localhost (or your host IP). Sign in with the admin creds from .env.
#
# Services:
#   - api      : FastAPI over the real engine (attack_engine.api). Spawns sandboxed
#                tool containers on the host Docker via the mounted socket.
#   - frontend : React SPA (nginx); reverse-proxies /api → api service.
#
# State: engine defaults are in-process (SQLite audit, in-memory event bus, NetworkX
# graph) so this runs with no extra services. For production, flip the AE_* backend
# vars (Postgres/Redis/Neo4j) in .env — no code change. See deploy/README.md.
#
# NOTE: the legacy Mongo prototype (backend/) is no longer built here — see
# backend/DEPRECATED.md.
services:
  api:
    build:
      context: .
      dockerfile: deploy/api.Dockerfile
    restart: unless-stopped
    environment:
      AE_ENV: ${AE_ENV:-prod}
      AE_LOG_JSON: ${AE_LOG_JSON:-true}
      # auth / shell
      AE_API_JWT_SECRET: ${AE_API_JWT_SECRET}
      AE_API_ADMIN_EMAIL: ${AE_API_ADMIN_EMAIL}
      AE_API_ADMIN_PASSWORD: ${AE_API_ADMIN_PASSWORD}
      AE_API_ORIGINS: ${AE_API_ORIGINS:-}
      # governance state (defaults: sqlite + in-proc; override for prod)
      AE_AUDIT_BACKEND: ${AE_AUDIT_BACKEND:-sqlite}
      AE_EVENTBUS_BACKEND: ${AE_EVENTBUS_BACKEND:-memory}
      AE_GRAPH_BACKEND: ${AE_GRAPH_BACKEND:-networkx}
      # optional managed backends (set these in .env for production)
      AE_AUDIT_POSTGRES_DSN: ${AE_AUDIT_POSTGRES_DSN:-}
      AE_EVENTBUS_REDIS_URL: ${AE_EVENTBUS_REDIS_URL:-}
      AE_NEO4J_URL: ${AE_NEO4J_URL:-}
      AE_NEO4J_USER: ${AE_NEO4J_USER:-}
      AE_NEO4J_PASSWORD: ${AE_NEO4J_PASSWORD:-}
      # offensive tool sandbox: the host network the tool containers join so they can
      # reach the authorized targets (scope is still enforced deny-by-default).
      AE_SANDBOX_BACKEND: ${AE_SANDBOX_BACKEND:-docker}
      AE_SANDBOX_NETWORK: ${AE_SANDBOX_NETWORK:-}
      # BYOM model gateway
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AE_MODEL_MOCK: ${AE_MODEL_MOCK:-false}
    volumes:
      # spawn locked-down tool sandboxes on the host Docker (docker-out-of-docker)
      - /var/run/docker.sock:/var/run/docker.sock
      - ae_data:/app/data
    networks: [eightpi]
    # internal only — frontend nginx proxies /api to it
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # empty → SPA uses relative /api (same-origin via nginx)
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${HTTP_PORT:-80}:80"
    networks: [eightpi]

networks:
  eightpi:
    driver: bridge

volumes:
  ae_data:
    driver: local
