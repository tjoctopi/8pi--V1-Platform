# Ground-truth cyber range — the yardstick and the safe sandbox (spec §7).
#
# Known-vulnerable targets with *planted* bugs, so the engine's precision/recall
# can be measured against ground truth. Everything sits on an isolated bridge
# network with a fixed subnet, so an engagement scope maps cleanly onto it:
#
#     allowed_cidrs: ["10.5.0.0/24"]
#
# This range is intentionally vulnerable. NEVER expose it to an untrusted
# network. Bring it up only on a host you control.
name: attack-engine-range

networks:
  range_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.5.0.0/24

services:
  # OWASP Juice Shop — modern web app with a wide OWASP-Top-10 surface.
  juice-shop:
    image: bkimminich/juice-shop:v17.1.1
    container_name: ae-juice-shop
    restart: unless-stopped
    networks:
      range_net:
        ipv4_address: 10.5.0.10
    ports:
      - "127.0.0.1:3000:3000"   # bound to localhost only

  # DVWA — classic planted vulns (SQLi, XSS, command injection, file upload).
  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: ae-dvwa
    restart: unless-stopped
    networks:
      range_net:
        ipv4_address: 10.5.0.11
    ports:
      - "127.0.0.1:8080:80"

  # Metasploitable 2 — network-service targets (vsftpd, Samba, Apache, MySQL…).
  metasploitable:
    image: tleemcjr/metasploitable2:latest
    container_name: ae-metasploitable
    restart: unless-stopped
    command: ["/bin/sh", "-c", "service ssh start; /etc/init.d/apache2 start; tail -f /dev/null"]
    networks:
      range_net:
        ipv4_address: 10.5.0.12

  # Samba Active Directory DC — a Linux AD forest for identity attacks (O5/O6):
  # LDAP + Kerberos so BloodHound collection and Kerberoasting have a target.
  # Domain: CORP.LOCAL. Bring up with `--profile ad` (heavier than the others).
  ad-dc:
    image: ghcr.io/dockur/samba-domain:latest
    container_name: ae-ad-dc
    profiles: ["ad"]
    restart: unless-stopped
    environment:
      DOMAIN: "CORP.LOCAL"
      DOMAINPASS: "R4ngePass!"        # range-only DA password (never reuse)
      HOSTIP: "10.5.0.20"
      INSECURE: "true"                # weak defaults on purpose — it's a range
    cap_add: ["NET_ADMIN"]
    networks:
      range_net:
        ipv4_address: 10.5.0.20

  # Persistent C2 / reverse-shell listener (O2/O3): a long-running Metasploit
  # RPC daemon that catches and HOLDS sessions across tool runs. Reverse-shell
  # exploits set LHOST=10.5.0.30 (the engagement's configured C2 listener).
  c2-server:
    image: metasploitframework/metasploit-framework:latest
    container_name: ae-c2-server
    profiles: ["c2"]
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "./msfrpcd -P R4ngeRpc! -S -a 0.0.0.0 -p 55553 && tail -f /dev/null"
    networks:
      range_net:
        ipv4_address: 10.5.0.30
