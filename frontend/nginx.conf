# 8pi frontend + reverse-proxy for /api → engine API service on port 8000
# The API container is reachable as `api` on the compose network (attack_engine.api).

upstream eightpi_backend {
    server api:8000;
}

server {
    listen 80 default_server;
    server_name _;

    # SPA
    root /usr/share/nginx/html;
    index index.html;

    # sensible defaults
    client_max_body_size 20m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Never cache index.html (SPA shell)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Long-cache hashed assets
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        try_files $uri =404;
    }

    # Reverse-proxy the API to the backend.
    # SSE streams must not be buffered.
    location /api/ {
        proxy_pass         http://eightpi_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE
        proxy_buffering            off;
        proxy_cache                off;
        proxy_set_header           Connection "";
        proxy_read_timeout         900s;
        proxy_send_timeout         900s;

        # WebSocket-friendly (future-proof)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
