# 8pi frontend + reverse-proxy for /api → engine API service on port 8000.
# The API container is reachable as `api` on the compose network (attack_engine.api).
# We resolve it per-request via Docker's embedded DNS (127.0.0.11) so a recreated
# api container (new IP) does not leave nginx serving a stale upstream (502).

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        try_files $uri =404;
    }

    # Reverse-proxy the API. Per-request DNS resolution avoids stale-upstream 502s.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream_api api:8000;
        proxy_pass         http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE streams must not be buffered
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   Connection "";
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;

        # WebSocket-friendly (future-proof)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
